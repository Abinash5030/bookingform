<form id="travelForm">
<div class="travel-form">

<h2>REQUEST TRAVEL PROPOSAL</h2>
<p>* indicates a required field</p>

<h4>TRAVEL INFORMATION</h4>

<!-- STEP 1 -->
<div class="form-step active" id="step1">
    <label>1. What do you want to do? *</label>

    <div class="options">
        <label><input type="checkbox" name="country[]"> Safari</label>
        <label><input type="checkbox" name="country[]"> Beach holiday</label>
        <!-- <label><input type="checkbox" name="country[]"> Uganda</label>
        <label><input type="checkbox" name="country[]"> Rwanda</label> -->
    </div>
</div>

<!-- STEP 2 -->
<div class="form-step disabled" id="step2">
    <label>2. How many days do you want to travel? *</label>

    <div class="range-box custom-range">

    <span>3</span>

    <div class="range-wrapper">
        <input type="range" min="3" max="21" value="8" id="daysRange">
        <div class="range-value" id="rangeValue">8 days</div>
    </div>

    <span>21+</span>

</div>
</div>

<!-- STEP 3 -->
<div class="form-step disabled" id="step3">
    <label>3. Who are you travelling with?</label>

    <div class="options radio">
        <label><input type="radio" name="group"> Solo</label>
        <label><input type="radio" name="group"> Couple</label>
        
        <label><input type="radio" name="group"> Family</label>
        <label><input type="radio" name="group"> Group</label>
    </div>
</div>

<!-- STEP 4 -->
<div class="form-step disabled" id="step4">
    <label>4. When do you want to travel?</label>
     <div class="two-col">
       <div class="date-one">
         <label>Arrival Date</label>
        <input type="date" placeholder="Arrival Date" id="arrival_date" required>
       </div>
        <div class="date-two">
           <label>Departure Date</label>
        <input type="date" placeholder="Departure Date" id="departure_date" required>  
        </div>
       
    </div>
</div>

<!-- STEP 5 -->
<div class="form-step disabled" id="step5">
    <label>5. Budget per person</label>

    <div class="range-box custom-range">

        <span>$2000</span>

        <div class="range-wrapper">
            <input type="range" min="2000" max="7500" step="100" value="3500" id="budgetRange">
            <div class="range-value" id="budgetValue">$3500</div>
        </div>

        <span>$7500+</span>

    </div>
</div>
